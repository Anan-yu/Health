spring:
  datasource:
    url: jdbc:h2:mem:rayk_test;MODE=MySQL;DATABASE_TO_LOWER=TRUE;CASE_INSENSITIVE_IDENTIFIERS=TRUE;NON_KEYWORDS=VALUE
    username: sa
    password:
    driver-class-name: org.h2.Driver
  flyway:
    enabled: true
    locations: classpath:db/test-migration
  data:
    redis:
      host: localhost
      port: 6379
      password: test
  jackson:
    default-property-inclusion: non_null

mybatis-plus:
  configuration:
    map-underscore-to-camel-case: true
  global-config:
    banner: false
    db-config:
      logic-delete-field: deleted
      logic-delete-value: 1
      logic-not-delete-value: 0

rayk:
  auth:
    mode: database
  jwt:
    secret: test_secret_key_for_unit_tests_only_not_for_production_1234
    expire-seconds: 3600
  wechat:
    app-id:
    secret:
    code2-session-url: https://api.weixin.qq.com/sns/jscode2session
    mock-enabled: true
    mock-openid: test-openid
    auto-bind-username:
  ai:
    base-url: http://localhost:8000
    connect-timeout-seconds: 5
    read-timeout-seconds: 30
  minio:
    endpoint: http://localhost:9000
    public-endpoint: http://localhost:9000
    access-key: test
    secret-key: test
    bucket-reports: test-reports
    region: us-east-1
    presign-expiry-seconds: 600

logging:
  level:
    root: WARN
    com.rayk.health: DEBUG
