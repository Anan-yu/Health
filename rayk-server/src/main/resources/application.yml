spring:
  application:
    name: rayk-server
  datasource:
    url: jdbc:mysql://${MYSQL_HOST:localhost}:${MYSQL_PORT:3307}/${MYSQL_DATABASE:rayk_health}?useUnicode=true&characterEncoding=utf8&serverTimezone=Asia/Shanghai&allowPublicKeyRetrieval=true&useSSL=false
    username: ${MYSQL_USER:rayk}
    password: ${MYSQL_PASSWORD:rayk_dev_password}
    driver-class-name: com.mysql.cj.jdbc.Driver
    hikari:
      maximum-pool-size: 10
      minimum-idle: 2
  data:
    redis:
      host: ${REDIS_HOST:localhost}
      port: ${REDIS_PORT:6380}
      password: ${REDIS_PASSWORD:rayk_redis_dev_password}
      timeout: 3s
  flyway:
    enabled: true
    locations: classpath:db/migration
    baseline-on-migrate: true
  jackson:
    default-property-inclusion: non_null
  servlet:
    multipart:
      max-file-size: 20MB
      max-request-size: 22MB

server:
  port: 8080
  forward-headers-strategy: framework

mybatis-plus:
  configuration:
    map-underscore-to-camel-case: true
  global-config:
    banner: false
    db-config:
      logic-delete-field: deleted
      logic-delete-value: 1
      logic-not-delete-value: 0

management:
  endpoints:
    web:
      exposure:
        include: health,info
  endpoint:
    health:
      probes:
        enabled: true
      show-details: when_authorized

springdoc:
  swagger-ui:
    path: /swagger-ui.html
  api-docs:
    path: /v3/api-docs

rayk:
  auth:
    # 账号体系模式：database=基于 sys_user/RBAC 表（默认）；mock=内存固定开发账号（仅本地调试）
    mode: ${RAYK_AUTH_MODE:database}
    # 仅本地开发环境允许账号密码调试入口；生产环境不注册该接口。
    development-login-enabled: ${RAYK_DEVELOPMENT_LOGIN_ENABLED:false}
  jwt:
    secret: ${JWT_SECRET:rayk_dev_only_secret_change_before_production_123456}
    expire-seconds: ${JWT_EXPIRE_SECONDS:7200}
  wechat:
    app-id: ${WECHAT_APP_ID:}
    secret: ${WECHAT_APP_SECRET:}
    code2-session-url: ${WECHAT_CODE2SESSION_URL:https://api.weixin.qq.com/sns/jscode2session}
    mock-enabled: ${WECHAT_MOCK_ENABLED:false}
    mock-openid: ${WECHAT_MOCK_OPENID:rayk-dev-openid}
    auto-bind-username: ${WECHAT_AUTO_BIND_USERNAME:}
  ai:
    base-url: ${RAYK_AI_BASE_URL:http://localhost:8000}
    connect-timeout-seconds: 5
    read-timeout-seconds: ${RAYK_AI_READ_TIMEOUT_SECONDS:300}
  minio:
    endpoint: ${MINIO_ENDPOINT:http://localhost:9000}
    public-endpoint: ${MINIO_PUBLIC_ENDPOINT:http://127.0.0.1:9000}
    access-key: ${MINIO_ACCESS_KEY:rayk_minio}
    secret-key: ${MINIO_SECRET_KEY:rayk_minio_dev_password}
    bucket-reports: ${MINIO_BUCKET_REPORTS:rayk-reports}
    region: ${MINIO_REGION:us-east-1}
    presign-expiry-seconds: ${MINIO_PRESIGN_EXPIRY_SECONDS:600}
  task:
    processing-timeout-minutes: ${RAYK_TASK_PROCESSING_TIMEOUT_MINUTES:10}
    pending-timeout-minutes: ${RAYK_TASK_PENDING_TIMEOUT_MINUTES:2}
    recovery-interval-ms: ${RAYK_TASK_RECOVERY_INTERVAL_MS:60000}

logging:
  pattern:
    console: "%d{yyyy-MM-dd HH:mm:ss.SSS} %-5level [%thread] [%X{requestId:-}] %logger{36} - %msg%n"
  level:
    root: INFO
    com.rayk.health: INFO
