name: ${COMPOSE_PROJECT_NAME:-rayk-a1}

services:
  mysql:
    image: ${MYSQL_IMAGE:-mysql:8.4}
    environment:
      MYSQL_DATABASE: ${MYSQL_DATABASE:-rayk_health}
      MYSQL_USER: ${MYSQL_USER:-rayk}
      MYSQL_PASSWORD: ${MYSQL_PASSWORD:-rayk_dev_password}
      MYSQL_ROOT_PASSWORD: ${MYSQL_ROOT_PASSWORD:-rayk_root_dev_password}
      TZ: Asia/Shanghai
    command: ["--character-set-server=utf8mb4", "--collation-server=utf8mb4_0900_ai_ci"]
    volumes:
      - rayk_mysql_data:/var/lib/mysql
    networks: [rayk-net]
    healthcheck:
      test: ["CMD-SHELL", "mysqladmin ping -h 127.0.0.1 -uroot -p$${MYSQL_ROOT_PASSWORD} --silent"]
      interval: 10s
      timeout: 5s
      retries: 20
      start_period: 30s
    restart: unless-stopped

  redis:
    image: ${REDIS_IMAGE:-redis:7.4-alpine}
    environment:
      REDIS_PASSWORD: ${REDIS_PASSWORD:-rayk_redis_dev_password}
    command: ["sh", "-c", "exec redis-server --appendonly yes --requirepass \"$${REDIS_PASSWORD}\""]
    volumes:
      - rayk_redis_data:/data
    networks: [rayk-net]
    healthcheck:
      test: ["CMD-SHELL", "redis-cli -a \"$${REDIS_PASSWORD}\" ping | grep PONG"]
      interval: 10s
      timeout: 5s
      retries: 15
    restart: unless-stopped

  minio:
    image: ${MINIO_IMAGE:-minio/minio:RELEASE.2025-04-22T22-12-26Z}
    environment:
      MINIO_ROOT_USER: ${MINIO_ROOT_USER:-rayk_minio}
      MINIO_ROOT_PASSWORD: ${MINIO_ROOT_PASSWORD:-rayk_minio_dev_password}
    command: server /data --console-address ":9001"
    volumes:
      - rayk_minio_data:/data
    networks: [rayk-net]
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:9000/minio/health/live"]
      interval: 10s
      timeout: 5s
      retries: 15
    restart: unless-stopped

  minio-init:
    image: ${MINIO_MC_IMAGE:-minio/mc:RELEASE.2025-04-16T18-13-26Z}
    depends_on:
      minio:
        condition: service_healthy
    environment:
      MINIO_ROOT_USER: ${MINIO_ROOT_USER:-rayk_minio}
      MINIO_ROOT_PASSWORD: ${MINIO_ROOT_PASSWORD:-rayk_minio_dev_password}
      MINIO_BUCKET_REPORTS: ${MINIO_BUCKET_REPORTS:-rayk-reports}
    entrypoint: >-
      /bin/sh -c '
      mc alias set rayk http://minio:9000 "$${MINIO_ROOT_USER}" "$${MINIO_ROOT_PASSWORD}" &&
      mc mb --ignore-existing rayk/"$${MINIO_BUCKET_REPORTS}" &&
      mc anonymous set none rayk/"$${MINIO_BUCKET_REPORTS}"
      '
    networks: [rayk-net]
    restart: "no"

  rayk-ai:
    build:
      context: ./rayk-ai
      dockerfile: Dockerfile
    image: rayk-a1-ai:dev
    environment:
      TZ: Asia/Shanghai
    networks: [rayk-net]
    healthcheck:
      test: ["CMD", "python", "-c", "import urllib.request; urllib.request.urlopen('http://localhost:8000/health')"]
      interval: 10s
      timeout: 5s
      retries: 15
    restart: unless-stopped

  rayk-server:
    build:
      context: .
      dockerfile: rayk-server/Dockerfile
    image: rayk-a1-server:dev
    environment:
      SPRING_PROFILES_ACTIVE: ${SPRING_PROFILES_ACTIVE:-docker}
      MYSQL_HOST: mysql
      MYSQL_PORT: 3306
      MYSQL_DATABASE: ${MYSQL_DATABASE:-rayk_health}
      MYSQL_USER: ${MYSQL_USER:-rayk}
      MYSQL_PASSWORD: ${MYSQL_PASSWORD:-rayk_dev_password}
      REDIS_HOST: redis
      REDIS_PORT: 6379
      REDIS_PASSWORD: ${REDIS_PASSWORD:-rayk_redis_dev_password}
      JWT_SECRET: ${JWT_SECRET:-rayk_dev_only_secret_change_before_production_123456}
      JWT_EXPIRE_SECONDS: ${JWT_EXPIRE_SECONDS:-7200}
      RAYK_AI_BASE_URL: ${RAYK_AI_BASE_URL:-http://rayk-ai:8000}
      MINIO_ENDPOINT: ${MINIO_ENDPOINT:-http://minio:9000}
      MINIO_ACCESS_KEY: ${MINIO_ROOT_USER:-rayk_minio}
      MINIO_SECRET_KEY: ${MINIO_ROOT_PASSWORD:-rayk_minio_dev_password}
      MINIO_BUCKET_REPORTS: ${MINIO_BUCKET_REPORTS:-rayk-reports}
      TZ: Asia/Shanghai
    depends_on:
      mysql:
        condition: service_healthy
      redis:
        condition: service_healthy
      minio:
        condition: service_healthy
      minio-init:
        condition: service_completed_successfully
      rayk-ai:
        condition: service_healthy
    volumes:
      - rayk_logs_data:/app/logs
    networks: [rayk-net]
    healthcheck:
      test: ["CMD", "wget", "-qO-", "http://localhost:8080/actuator/health"]
      interval: 15s
      timeout: 5s
      retries: 20
      start_period: 30s
    restart: unless-stopped

  nginx:
    image: ${NGINX_IMAGE:-nginx:1.27-alpine}
    depends_on:
      rayk-server:
        condition: service_healthy
      rayk-ai:
        condition: service_healthy
    volumes:
      - ./deploy/nginx/nginx.conf:/etc/nginx/nginx.conf:ro
      - ./rayk-miniapp/dist/build/h5:/usr/share/nginx/html:ro
    networks: [rayk-net]
    healthcheck:
      test: ["CMD", "wget", "-qO-", "http://127.0.0.1/health"]
      interval: 10s
      timeout: 5s
      retries: 10
    restart: unless-stopped

networks:
  rayk-net:
    driver: bridge

volumes:
  rayk_mysql_data:
    name: rayk_mysql_data
  rayk_redis_data:
    name: rayk_redis_data
  rayk_minio_data:
    name: rayk_minio_data
  rayk_logs_data:
    name: rayk_logs_data
