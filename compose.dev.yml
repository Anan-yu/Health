services:
  mysql:
    ports:
      - "127.0.0.1:${MYSQL_PORT:-3307}:3306"
  redis:
    ports:
      - "127.0.0.1:${REDIS_PORT:-6380}:6379"
  minio:
    ports:
      - "${MINIO_PORT:-9000}:9000"
      - "${MINIO_CONSOLE_PORT:-9001}:9001"
  rayk-ai:
    ports:
      - "${AI_PORT:-8000}:8000"
  rayk-server:
    ports:
      - "${JAVA_PORT:-8080}:8080"
  nginx:
    ports:
      - "${NGINX_PORT:-8088}:80"
